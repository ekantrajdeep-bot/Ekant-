<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EagleDateing - Welcome to Live Match</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }
        body { background-color: #121212; color: #ffffff; padding: 10px; display: flex; flex-direction: column; align-items: center; }
        
        header { width: 100%; max-width: 450px; background: linear-gradient(135deg, #ff4e50, #f9d423); padding: 15px; text-align: center; font-size: 24px; font-weight: bold; border-radius: 10px; margin-bottom: 15px; box-shadow: 0 4px 15px rgba(255, 78, 80, 0.3); }
        
        /* Attractive Welcome Message Banner */
        .welcome-banner { width: 100%; max-width: 450px; background: linear-gradient(135deg, #1e1e2f, #252542); border: 1px solid #ff4e50; border-radius: 12px; padding: 15px; text-align: center; margin-bottom: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }
        .welcome-banner h2 { font-size: 20px; color: #f9d423; margin-bottom: 5px; }
        .welcome-banner p { font-size: 13px; color: #e0e0e0; line-height: 1.4; }
        .welcome-highlight { color: #00b894; font-weight: bold; }

        /* Real Ad Slots */
        .ad-slot { width: 100%; max-width: 450px; background: #1e1e1e; border: 1px dashed #ff9f43; border-radius: 10px; padding: 10px; text-align: center; margin-bottom: 15px; min-height: 60px; }
        
        .action-buttons { width: 100%; max-width: 450px; display: flex; gap: 10px; margin-bottom: 15px; }
        .btn-action { flex: 1; padding: 14px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 15px; text-align: center; transition: 0.2s; }
        .btn-reg { background: linear-gradient(135deg, #00b894, #00cec9); color: white; box-shadow: 0 4px 10px rgba(0, 184, 148, 0.2); }
        .btn-search { background-color: #0984e3; color: white; }

        /* Modal style */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); justify-content: center; align-items: center; z-index: 100; padding: 20px; }
        .modal-content { background: #1e1e1e; padding: 20px; border-radius: 12px; width: 100%; max-width: 400px; border: 1px solid #333; }
        .form-group { margin-bottom: 12px; }
        .form-group label { display: block; margin-bottom: 5px; font-size: 12px; color: #aaa; }
        .form-group input, .form-group select { width: 100%; padding: 10px; background: #2d2d2d; border: 1px solid #444; border-radius: 6px; color: white; }
        .form-submit { width: 100%; padding: 12px; background: #00b894; border: none; border-radius: 6px; color: white; font-weight: bold; cursor: pointer; font-size: 16px; }
        .close-btn { float: right; cursor: pointer; color: #aaa; font-size: 20px; }

        /* Profiles style */
        .search-box { display: none; width: 100%; max-width: 450px; background: #1e1e1e; padding: 12px; border-radius: 10px; margin-bottom: 15px; }
        .profile-card { background: #1e1e1e; border-radius: 15px; padding: 20px; margin-bottom: 20px; width: 100%; max-width: 450px; border: 1px solid #2d2d2d; }
        .profile-img { width: 100%; height: 250px; object-fit: cover; border-radius: 10px; margin-bottom: 15px; background: #2d2d2d; }
        .profile-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .lock-box { background: #2d2d2d; border-radius: 8px; padding: 12px; text-align: center; margin-top: 15px; font-weight: bold; }
        .btn-unlock { width: 100%; background: linear-gradient(135deg, #ff4e50, #f9d423); color: white; border: none; padding: 14px; border-radius: 8px; font-size: 16px; font-weight: bold; margin-top: 10px; cursor: pointer; }
        
        .ad-network-box { margin-top: 15px; background: #151515; border: 1px dashed #ff9f43; padding: 15px; border-radius: 10px; text-align: center; }
        .btn-watch { width: 100%; background: #00b894; color: white; border: none; padding: 12px; border-radius: 6px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

    <header>🦅 EagleDateing</header>

    <div class="welcome-banner">
        <h2>👋 Welcome to EagleDateing!</h2>
        <p>Apne aas-paas ke verified singles se judiye. Sirf 1 minute mein apni profile banayein aur live chat shuru karein! <br><span class="welcome-highlight">🔒 Aapka mobile number poori tarah surakshit hai.</span></p>
    </div>

    <div class="ad-slot" id="top-ad">
        <p style="font-size: 12px; color: #ff9f43;">✨ Sponsored Ad Slot (Top) ✨</p>
        </div>

    <div class="action-buttons">
        <button class="btn-action btn-reg" onclick="toggleModal(true)">➕ Create My Profile</button>
        <button class="btn-action btn-search" onclick="toggleSearch()">🔍 Filter Location</button>
    </div>

    <div class="search-box" id="searchBox">
        <select id="locationFilter" onchange="filterProfiles()">
            <option value="all">Show All Locations</option>
            <option value="Nagpur">Nagpur</option>
            <option value="Mumbai">Mumbai</option>
            <option value="Delhi">Delhi</option>
        </select>
    </div>

    <div id="profilesContainer" style="width: 100%; max-width: 450px;"></div>

    <div class="ad-slot" id="bottom-ad" style="margin-top: 15px;">
        <p style="font-size: 12px; color: #ff9f43;">✨ Sponsored Ad Slot (Bottom) ✨</p>
        </div>

    <div class="modal" id="regModal">
        <div class="modal-content">
            <span class="close-btn" onclick="toggleModal(false)">&times;</span>
            <h3 style="margin-bottom:15px; color:#00b894;">Create Your Live Profile</h3>
            <form id="regForm" onsubmit="handleRegistration(event)">
                <div class="form-group"><label>Name</label><input type="text" id="regName" required placeholder="Your Name"></div>
                <div class="form-group"><label>Age</label><input type="number" id="regAge" required min="18" placeholder="Age"></div>
                <div class="form-group">
                    <label>City</label>
                    <select id="regLocation">
                        <option value="Nagpur">Nagpur</option>
                        <option value="Mumbai">Mumbai</option>
                        <option value="Delhi">Delhi</option>
                    </select>
                </div>
                <div class="form-group"><label>Mobile Number (Locked for Ads)</label><input type="text" id="regPhone" required placeholder="WhatsApp/Phone Number"></div>
                <div class="form-group">
                    <label>Upload Profile Photo</label>
                    <input type="file" id="regPhotoFile" accept="image/*" required>
                </div>
                <button type="submit" class="form-submit" id="submitBtn">Publish Live Profile</button>
            </form>
        </div>
    </div>

<script>
    // Embedded User's Real ImgBB API Key from previous confirmation
    const IMGBB_API_KEY = "0871c53c4fe16febda45c2c70f8d2b64"; 

    const baseProfiles = [
        { id: 1, name: "Priya Sharma", age: 24, location: "Mumbai", img: "https://images.unsplash.com/photo-1494790108377-be9c29b29330?w=400", habits: "Non-Smoker", hobbies: "Music" },
        { id: 2, name: "Sneha Deshmukh", age: 22, location: "Nagpur", img: "https://images.unsplash.com/photo-1534528741775-53994a69daeb?w=400", habits: "Teetotaler", hobbies: "Reading" }
    ];

    let customProfiles = JSON.parse(localStorage.getItem('eagle_live_profiles')) || [];
    let allProfiles = [...customProfiles, ...baseProfiles];
    let adCounts = JSON.parse(localStorage.getItem('eagle_ad_clicks')) || {};

    function renderProfiles(data) {
        const container = document.getElementById('profilesContainer');
        container.innerHTML = '';
        
        data.forEach(p => {
            const currentCount = adCounts[p.id] || 0;
            const isLocked = currentCount < 1000;
            
            const card = document.createElement('div');
            card.className = 'profile-card';
            card.innerHTML = `
                <img class="profile-img" src="${p.img}" alt="Profile">
                <div class="profile-header">
                    <span style="font-size:20px; font-weight:bold;">${p.name}, ${p.age}</span>
                    <span style="background:#2ed573; padding:2px 8px; border-radius:10px; font-size:12px;">Online</span>
                </div>
                <div style="margin-bottom:5px; font-size:14px;">📍 City: ${p.location}</div>
                
                ${isLocked ? `
                    <div class="lock-box" id="lock-${p.id}">🔒 Number Locked (1000 Ads Required)</div>
                    <button class="btn-unlock" id="btn-main-${p.id}" onclick="showAdBox(${p.id})">Get Mobile Number</button>
                    
                    <div class="ad-network-box" id="ad-net-${p.id}" style="display:none;">
                        <div style="color:#ff9f43; font-weight:bold; margin-bottom:10px;">Ads Watched: <span id="count-${p.id}">${currentCount}</span> / 1000</div>
                        <button class="btn-watch" onclick="watchAd(${p.id})">▶️ Watch Video Ad</button>
                    </div>
                ` : `
                    <div class="lock-box" style="background:#00b894; color:white;">🔓 Number: ${p.phone || "9823xxxxxx"}</div>
                `}
            `;
            container.appendChild(card);
        });
    }

    function toggleModal(show) { document.getElementById('regModal').style.display = show ? 'flex' : 'none'; }
    function toggleSearch() { const b = document.getElementById('searchBox'); b.style.display = b.style.display === 'block' ? 'none' : 'block'; }

    async function handleRegistration(e) {
        e.preventDefault();
        const submitBtn = document.getElementById('submitBtn');
        const fileInput = document.getElementById('regPhotoFile');
        
        if (!fileInput.files[0]) return alert("Please select a profile photo!");
        
        submitBtn.innerText = "Publishing & Uploading Photo...";
        submitBtn.disabled = true;

        const formData = new FormData();
        formData.append("image", fileInput.files[0]);

        try {
            // Live Link Joining with ImgBB
            const res = await fetch(`https://api.imgbb.com/1/upload?key=${IMGBB_API_KEY}`, {
                method: "POST",
                body: formData
            });
            const resData = await res.json();
            
            if(resData.success) {
                const uploadedImageUrl = resData.data.url; // Image direct Link generated
                
                const newProfile = {
                    id: Date.now(),
                    name: document.getElementById('regName').value,
                    age: document.getElementById('regAge').value,
                    location: document.getElementById('regLocation').value,
                    phone: document.getElementById('regPhone').value,
                    img: uploadedImageUrl // Linked to the profile card
                };

                customProfiles.unshift(newProfile);
                localStorage.setItem('eagle_live_profiles', JSON.stringify(customProfiles));
                
                allProfiles = [...customProfiles, ...baseProfiles];
                renderProfiles(allProfiles);
                
                toggleModal(false);
                e.target.reset();
                alert("🎉 Success! Your profile is live with your real photo link!");
            } else {
                alert("Photo upload failed. Please try another image.");
            }
        } catch (err) {
            alert("Error connecting to storage server.");
        } finally {
            submitBtn.innerText = "Publish Live Profile";
            submitBtn.disabled = false;
        }
    }

    function filterProfiles() {
        const city = document.getElementById('locationFilter').value;
        if(city === 'all') renderProfiles(allProfiles);
        else renderProfiles(allProfiles.filter(p => p.location === city));
    }

    function showAdBox(id) {
        document.getElementById(`ad-net-${id}`).style.display = 'block';
        document.getElementById(`btn-main-${id}`).style.display = 'none';
    }

    function watchAd(id) {
        let current = adCounts[id] || 0;
        if(current < 1000) {
            current += 1;
            adCounts[id] = current;
            localStorage.setItem('eagle_ad_clicks', JSON.stringify(adCounts));
            document.getElementById(`count-${id}`).innerText = current;

            if(current >= 1000) {
                alert("Unlocked!");
                renderProfiles(allProfiles);
            }
        }
    }

    renderProfiles(allProfiles);
</script>
</body>
</html>
