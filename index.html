<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eagle Dating - Live Chat</title>
    
    <!-- Adsterra Popunder Ad Script (Earning ke liye) -->
    <script src="https://pl29751221.effectivecpmnetwork.com/0d/c2/44/0dc244659d309013c4152eab11e49ba7.js"></script>

    <!-- Firebase App aur Database Compat Libraries -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: Arial, sans-serif; }
        body { background-color: #f0f2f5; display: flex; flex-direction: column; height: 100vh; }
        header { background: linear-gradient(135deg, #ff4b2b, #ff416c); color: white; padding: 15px; text-align: center; font-size: 20px; font-weight: bold; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        #chat-container { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 10px; }
        .message { max-width: 75%; padding: 10px 15px; border-radius: 20px; font-size: 16px; line-height: 1.4; word-wrap: break-word; }
        .message.incoming { background-color: white; align-self: flex-start; color: #333; border-bottom-left-radius: 5px; box-shadow: 0 1px 2px rgba(0,0,0,0.1); }
        .message.outgoing { background-color: #0084ff; color: white; align-self: flex-end; border-bottom-right-radius: 5px; box-shadow: 0 1px 2px rgba(0,0,0,0.1); }
        .meta-info { font-size: 11px; margin-top: 4px; opacity: 0.7; text-align: right; }
        #input-container { background: white; padding: 10px; display: flex; gap: 10px; border-top: 1px solid #ddd; position: sticky; bottom: 0; }
        #message-input { flex: 1; padding: 12px; border: 1px solid #ccc; border-radius: 25px; outline: none; font-size: 16px; }
        #send-btn { background-color: #0084ff; color: white; border: none; padding: 0 20px; border-radius: 25px; font-size: 16px; font-weight: bold; cursor: pointer; }
        #send-btn:active { background-color: #0066cc; }
    </style>
</head>
<body>

    <header>🦅 Eagle Dating Live Chat 🦅</header>
    
    <div id="chat-container"></div>

    <div id="input-container">
        <input type="text" id="message-input" placeholder="Type a message..." autocomplete="off">
        <button id="send-btn">Send</button>
    </div>

    <script>
        // Aapka Ekdum Sahi Aur Poora Firebase Configuration
        const firebaseConfig = {
            apiKey: "AIzaSyAhY5TEz712ntfKgWXiiq3jYjT9Gwz9ZDc",
            authDomain: "eagledating.firebaseapp.com",
            databaseURL: "https://eagledating-default-rtdb.firebaseio.com",
            projectId: "eagledating",
            storageBucket: "eagledating.firebasestorage.app",
            messagingSenderId: "827853791832",
            appId: "1:827853791832:web:188b9d03fbc7a7480f202d",
            measurementId: "G-GTF0441E6Z"
        };

        // Firebase ko Initialize karna
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        // Users ko alag-alag pehchanne ke liye local session ID
        let userId = localStorage.getItem('chat_user_id');
        if (!userId) {
            userId = 'User_' + Math.floor(Math.random() * 1000000);
            localStorage.setItem('chat_user_id', userId);
        }

        const chatContainer = document.getElementById('chat-container');
        const messageInput = document.getElementById('message-input');
        const sendBtn = document.getElementById('send-btn');

        // Message Send karne ka logical function
        function sendMessage() {
            const text = messageInput.value.trim();
            if (text === '') return;

            // Database ke 'global_messages' node mein data push karna
            database.ref('global_messages').push({
                userId: userId,
                text: text,
                timestamp: Date.now()
            });

            messageInput.value = '';
        }

        sendBtn.addEventListener('click', sendMessage);
        messageInput.addEventListener('keypress', function(e) {
            if (e.key === 'Enter') sendMessage();
        });

        // Database se real-time messages screen par dikhana
        database.ref('global_messages').on('child_added', (snapshot) => {
            const data = snapshot.val();
            const messageEl = document.createElement('div');
            
            // Outgoing aur Incoming message styles manage karna
            if (data.userId === userId) {
                messageEl.classList.add('message', 'outgoing');
            } else {
                messageEl.classList.add('message', 'incoming');
            }

            const time = new Date(data.timestamp).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
            messageEl.innerHTML = `<div>${data.text}</div><div class="meta-info">${time}</div>`;
            
            chatContainer.appendChild(messageEl);
            chatContainer.scrollTop = chatContainer.scrollHeight;
        });
    </script>

</body>
</html>
